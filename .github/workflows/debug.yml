---
name: debug

on:
  workflow_dispatch:

jobs:
  debug:
    name: debug containers
    runs-on: [self-hosted, pljudfbee1]
    steps:
      - name: container status
        run: docker ps -a --filter "name=swarm_connect" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: dev container logs
        run: docker logs swarm_connect-provenance_gateway_dev-1 --tail 50 2>&1 || echo "Container not found"

      - name: dev container health
        run: docker inspect swarm_connect-provenance_gateway_dev-1 --format '{{.State.Health.Status}}' 2>/dev/null || echo "No healthcheck info"

      - name: curl health from inside server
        run: curl -s http://localhost:8900/health 2>&1 || echo "Cannot reach container on port 8900"

      - name: env file contents
        run: cat /opt/swarm_connect_dev.env 2>/dev/null | grep -v PRIVATE_KEY || echo "Env file not found"
