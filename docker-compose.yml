---
services:
  provenance_gateway:
    build: .
    image: swarm_connect:main
    ports:
      - "8899:8000"
    env_file:
      - /opt/swarm_connect.env
    environment:
      - SWARM_BEE_API_URL=http://192.168.45.30:1633
    volumes:
      - /opt/swarm_connect_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  provenance_gateway_dev:
    build: .
    image: swarm_connect:dev
    ports:
      - "8900:8000"
    env_file:
      - /opt/swarm_connect_dev.env
    environment:
      - SWARM_BEE_API_URL=http://192.168.45.30:1633
    volumes:
      - /opt/swarm_connect_dev_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  alloy:
    image: grafana/alloy:latest
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
    environment:
      - GRAFANA_CLOUD_PROM_USERNAME=${GRAFANA_CLOUD_PROM_USERNAME}
      - GRAFANA_CLOUD_API_TOKEN=${GRAFANA_CLOUD_API_TOKEN}
    command: ["run", "/etc/alloy/config.alloy"]
    restart: unless-stopped
    depends_on:
      - provenance_gateway_dev
